<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Warteg babi</title>
  <link rel="icon" href="logo-babi.png" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── LOADING ─────────────────────────────────────────────── -->
<div id="loading" class="screen active">
  <div class="loading-inner">
    <div class="logo">☕</div>
    <div class="loading-text">WARTEG BABI</div>
    <div class="spinner"></div>
  </div>
</div>

<!-- ── MENU ────────────────────────────────────────────────── -->
<div id="screen-menu" class="screen">
  <div class="topbar">
    <span class="topbar-title">Resto Babi KD</span>
    <button class="icon-btn" id="btn-orders-icon">📋</button>
  </div>
  <div id="category-tabs" class="category-tabs"></div>
  <div id="menu-list" class="menu-list"></div>
  <button id="btn-cart" class="cart-fab hidden">
    🛒 Keranjang · <span id="cart-count">0</span> item
    <span class="cart-total-fab" id="cart-total-fab"></span>
  </button>
</div>

<!-- ── CART ─────────────────────────────────────────────────── -->
<div id="screen-cart" class="screen">
  <div class="topbar">
    <button class="icon-btn back-btn" data-target="screen-menu">← Kembali</button>
    <span class="topbar-title">Keranjang</span>
  </div>
  <div id="cart-items" class="cart-list"></div>
  <div class="cart-footer">

    <button id="btn-toggle-voucher" class="btn-voucher">🎟 Pakai Voucher</button>
    <div id="voucher-msg" class="voucher-msg"></div>

    <div class="address-section">
      <div class="addr-row">
        <span class="addr-label-inline">📍 Tujuan:</span>
        <button id="btn-addr-pick" class="btn-addr-pick">KD ▾</button>
      </div>
      <div class="addr-picker hidden" id="addr-picker">
        <div class="address-chips">
          <button class="addr-chip active" data-addr="KD 1">KD 1(KD-bar)</button>
          <button class="addr-chip" data-addr="KD 2">KD 2</button>
          <button class="addr-chip" data-addr="KD 3(arjuna)">KD 3(arjuna)</button>
          <button class="addr-chip" data-addr="Apartmen">Apartmen</button>
          <button class="addr-chip" data-addr="Herlom Hotel">Herlom Hotel</button>
          <!-- <button class="addr-chip" data-addr="TRIUMPH">TRIUMPH</button>
          <button class="addr-chip" data-addr="SV HOTEL">SV HOTEL</button>
          <button class="addr-chip" data-addr="BOYA">BOYA</button> -->
        </div>
        <input id="addr-custom" class="addr-input" type="text" placeholder="Alamat lain (jarang diantar)..." />
      </div>
    </div>

    <div class="note-row">
      <textarea id="note-input" placeholder="Catatan untuk dapur (opsional)" rows="2"></textarea>
    </div>

    <div class="price-summary">
      <div class="price-row"><span>Subtotal</span><span id="sum-subtotal">0៛</span></div>
      <div class="price-row discount-row hidden" id="discount-row">
        <span>Voucher</span><span id="sum-discount" class="green">-0៛</span>
      </div>
      <div class="price-row total-row"><span>Total</span><span id="sum-total">0៛</span></div>
    </div>

    <div class="pay-method-row">
      <button id="btn-pay-cash" class="btn-pay-method">💵 Cash</button>
      <button id="btn-pay-aba"  class="btn-pay-method aba">🏦 ABA</button>
    </div>
  </div>
</div>

<!-- ── ABA BARCODE ────────────────────────────────────────────── -->
<div id="screen-aba" class="screen">
  <div class="topbar">
    <button class="icon-btn back-btn" data-target="screen-cart">← Kembali</button>
    <span class="topbar-title">Transfer ABA</span>
  </div>
  <div class="aba-inner">
    <p class="aba-hint">Scan QR di bawah lalu tap <strong>Sudah Transfer</strong></p>
    <img src="aba_mate.jpg" alt="ABA QR Code" class="aba-qr" />
    <p id="aba-total" class="aba-total"></p>
    <button id="btn-aba-confirm" class="btn-primary">✅ Sudah Transfer</button>
  </div>
</div>

<!-- ── PARTIAL DIALOG ────────────────────────────────────────── -->
<div id="screen-partial" class="screen" data-order-id="">
  <div class="success-inner">
    <div class="success-icon">⚠️</div>
    <h2>Item Sebagian Habis</h2>
    <p id="partial-body"></p>
    <button id="btn-partial-confirm" class="btn-primary">Lanjut Tanpa Item Itu</button>
    <button id="btn-partial-cancel" class="btn-secondary">Batalkan Order</button>
  </div>
</div>

<!-- ── ORDER SUCCESS ────────────────────────────────────────── -->
<div id="screen-success" class="screen">
  <div class="success-inner">
    <div class="success-icon">✅</div>
    <h2>Pesanan Masuk!</h2>
    <p>Order <strong id="success-order-id">#0</strong> sedang menunggu konfirmasi.</p>
    <p class="success-total">Total: <strong id="success-total">0៛</strong></p>
    <button id="btn-back-menu" class="btn-primary">Pesan Lagi</button>
    <button id="btn-see-orders" class="btn-secondary">Lihat Pesanan Saya</button>
  </div>
</div>

<!-- ── ORDERS LIST ──────────────────────────────────────────── -->
<div id="screen-orders" class="screen">
  <div class="topbar">
    <button class="icon-btn back-btn" data-target="screen-menu">← Kembali</button>
    <span class="topbar-title">Pesanan Saya</span>
  </div>
  <div id="orders-list" class="orders-list"></div>
</div>

<!-- ── ORDER DETAIL ─────────────────────────────────────────── -->
<div id="screen-order-detail" class="screen">
  <div class="topbar">
    <button class="icon-btn back-btn" data-target="screen-orders">← Kembali</button>
    <span class="topbar-title" id="detail-title">Order #0</span>
  </div>
  <div id="order-detail-body" class="order-detail-body"></div>
</div>

<script src="app.js?v=e384c54"></script>
</body>
</html>
